<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#70c5ce;
    touch-action:none;
}

canvas{
    display:block;
    width:100vw;
    height:100vh;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let bird = {
    x: 100,
    y: canvas.height/2,
    size: 20,
    velocity: 0
};

const gravity = 0.5;
const jump = -8;

let pipes = [];
let score = 0;
let gameOver = false;

function createPipe(){
    let gap = 180;
    let topHeight = Math.random() * (canvas.height - gap - 200) + 50;

    pipes.push({
        x: canvas.width,
        width: 70,
        top: topHeight,
        bottom: canvas.height - topHeight - gap,
        passed: false
    });
}

function flap(){
    if(gameOver){
        restart();
        return;
    }
    bird.velocity = jump;
}

document.addEventListener("click", flap);
document.addEventListener("touchstart", flap);

function restart(){
    bird.y = canvas.height/2;
    bird.velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
}

setInterval(()=>{
    if(!gameOver) createPipe();
}, 1800);

function update(){

    if(gameOver) return;

    bird.velocity += gravity;
    bird.y += bird.velocity;

    if(bird.y < 0 || bird.y > canvas.height){
        gameOver = true;
    }

    for(let i=0;i<pipes.length;i++){

        let p = pipes[i];
        p.x -= 4;

        if(!p.passed && p.x + p.width < bird.x){
            p.passed = true;
            score++;
        }

        if(
            bird.x + bird.size > p.x &&
            bird.x - bird.size < p.x + p.width &&
            (
                bird.y - bird.size < p.top ||
                bird.y + bird.size > canvas.height - p.bottom
            )
        ){
            gameOver = true;
        }
    }

    pipes = pipes.filter(p=>p.x+p.width>0);
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // آسمان
    ctx.fillStyle="#70c5ce";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // لوله‌ها
    ctx.fillStyle="#2ecc71";

    pipes.forEach(p=>{

        ctx.fillRect(
            p.x,
            0,
            p.width,
            p.top
        );

        ctx.fillRect(
            p.x,
            canvas.height-p.bottom,
            p.width,
            p.bottom
        );
    });

    // پرنده
    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(
        bird.x,
        bird.y,
        bird.size,
        0,
        Math.PI*2
    );
    ctx.fill();

    // امتیاز
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText(score, 20, 50);

    if(gameOver){
        ctx.fillStyle="black";
        ctx.font="50px Arial";
        ctx.fillText(
            "Game Over",
            canvas.width/2 - 140,
            canvas.height/2
        );

        ctx.font="25px Arial";
        ctx.fillText(
            "برای شروع دوباره لمس کن",
            canvas.width/2 - 120,
            canvas.height/2 + 50
        );
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

createPipe();
loop();
</script>

</body>
</html>
